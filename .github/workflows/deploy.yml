name: Deploy versioned docs

on:
  push:
    branches:
      - main
      - 'release/**'

concurrency:
  group: docs-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO_TOKEN }}

      - name: Build and push
        id: build
        uses: VirtoCommerce/vc-github-actions/update-virtocommerce-docs-versioned@master
        with:
          githubToken: ${{ secrets.REPO_TOKEN }}
          ref: ${{ github.ref_name }}
          setAsLatest: ${{ github.ref_name == 'main' }}
          setAsDefault: ${{ github.ref_name == 'main' }}
          dockerRegistry: ${{ secrets.MAIN_DOCKER_REGISTRY }}
          dockerUsr: ${{ secrets.VCPT_DOCKER_USER }}
          dockerPwd: ${{ secrets.VCPT_DOCKER_PASSWORD }}

      - name: Deploy to VC Cloud
        timeout-minutes: 10
        run: |
          dotnet tool update --global VirtoCommerce.GlobalTool

          vc-build CloudEnvSetParameter \
            -CloudUrl https://portal.virtocommerce.cloud \
            -CloudToken ${{ secrets.VCPT_CLOUD_TOKEN }} \
            -EnvironmentName vcpt-license \
            -HelmParameters custom.app1.image.tag=${{ steps.build.outputs.docker-image-tag }}

          vc-build CloudEnvStatus \
            -CloudUrl https://portal.virtocommerce.cloud \
            -CloudToken ${{ secrets.VCPT_CLOUD_TOKEN }} \
            -EnvironmentName vcpt-license \
            -HealthStatus Progressing

          timeout 600 vc-build CloudEnvStatus \
            -CloudUrl https://portal.virtocommerce.cloud \
            -CloudToken ${{ secrets.VCPT_CLOUD_TOKEN }} \
            -EnvironmentName vcpt-license \
            -HealthStatus Healthy \
            -SyncStatus Synced

          echo "✅ Deployment to VC Cloud completed"
